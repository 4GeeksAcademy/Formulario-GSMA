<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-light">

    <div class="container-fluid my-3">

        <form class="bg-white p-3 border rounded">

            <div class="row">
                <div class="col-12 bg-light p-2 mb-3">
                    <h4>Payment form example</h4>
                </div>
            </div>

                <div class="alert alert-danger">
                   Some fields are missing
                </div>

                   <!-- datos 1 -->
            <div class="row">

                <div class="col-md-6">
                     <label class="form-label">Card #</label>
                     <input type="text" class="form-control" placeholder="XXXXXXXXXXXX">
                </div>

                <div class="col-md-2">
                     <label class="form-label">CVC #</label>
                     <input type="text" class="form-control" placeholder="0000">
                </div>

                <div class="col-md-4">
                     <label class="form-label">Amount</label>

                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="text" class="form-control" placeholder="Amount">
                    </div>

                </div>

            </div>

                    <!-- Datos 2 -->
                <div class="row mt-3">

                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control">
                    </div>

                </div>

                 <!-- datos 3 -->
                <div class="row mt-3">

                    <div class="col-md-6">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control">
                    </div>

                        <div class="col-md-3">
                            <label class="form-label">State</label>
                            <select class="form-select">
                                <option selected>Pick a state</option>
                                <option>Caracas</option>
                                <option>Miranda</option>
                                <option>Apure</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Postal Code</label>
                            <input type="text" class="form-control">
                        </div>

                 </div>

                  <!-- Tarjeta -->
             <div class="row mt-3">

                 <div class="col-sm-6 col-md-6">

                   <label class="form-label">We Accept:</label>

                    <div class="d-flex flex-wrap gap-4 bg-secondary p-2">

                    <input type="radio" name="card" id="visa">
                    <label for="visa">
                    <i class="fa-brands fa-cc-visa"></i>
                    </label>

            <input type="radio" name="card" id="master">
            <label for="master">
            <i class="fa-brands fa-cc-mastercard"></i>
            </label>

                 <input type="radio" name="card" id="diners">
                 <label for="diners">
                   <i class="fa-brands fa-cc-diners-club"></i>
                </label>

                   <input type="radio" name="card" id="jcb">
                   <label for="jcb">
                     <i class="fa-brands fa-cc-jcb"></i>
                    </label>

            </div>

            </div>

            <div class="col-md-6">

            <label class="form-label">Message</label>

                  <textarea class="form-control" placeholder="Add any notes here"></textarea>

             </div>

             </div>

                <!-- Botones -->
              <div class="text-end mt-4">

              <button type="button" class="btn btn-secondary">
                 Cancel
              </button>

                 <button type="submit" class="btn btn-primary">
                    Send
                  </button>

              </div>
        

        </form>

    </div>

</body>
</html>
